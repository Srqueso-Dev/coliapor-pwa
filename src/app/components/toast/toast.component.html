<div class="toast-container">
  @for (t of toast.toasts(); track t.id) {
    <div class="toast" [class.ok]="t.tipo === 'ok'" [class.error]="t.tipo === 'error'"
         [class.info]="t.tipo === 'info'" [class.confirm]="t.tipo === 'confirm'">

      <div class="toast-icono">
        @if (t.tipo === 'ok') {
          <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        } @else if (t.tipo === 'error') {
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
        } @else if (t.tipo === 'info') {
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
        } @else if (t.tipo === 'confirm') {
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
        }
      </div>

      <p class="toast-msg">{{ t.mensaje }}</p>

      @if (t.tipo === 'confirm') {
        <div class="toast-acciones">
          <button class="btn-confirmar" (click)="toast.responderConfirm(t.id, true)">Confirmar</button>
          <button class="btn-cancelar"  (click)="toast.responderConfirm(t.id, false)">Cancelar</button>
        </div>
      } @else {
        <button class="toast-cerrar" (click)="toast.quitar(t.id)">
          <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      }

    </div>
  }
</div>
